<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Navigation Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="css/styles.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

  </head>

  <body>
    <div id="pageWrapper">
      <div class="content">
        <div id="headerWrapper">
          <header>
            <img src="images/favicon_io/favicon.ico" alt="logo" />
            <span>Squatter Rights</span>
            <button id="hamburgerBtn"></button>
          </header>
        </div>
        <!-- end header wrapper -->

        <div id="navWrapper">
          <nav>
            <ul>
              <li><a href="#">Home</a></li>
              <li class="active"><a href="index.html">Hot Listings</a></li>
              <li><a href="#">About Us</a></li>
              <li><a href="#">Contact</a></li>
            </ul>
          </nav>
        </div>
        <!-- end nav wrapper -->

        <div id="mainWrapper">
          <main>
            <div id="cards"></div>
          </main>
        </div>
        <!-- end main wrapper -->

        <div id="footerWrapper">
          <footer>
            <p>
              Copyright &copy; 2025 Design Thinking Inc. All rights reserved.
              <a href="#">Privacy Policy</a> | <a href="#">Terms of Use</a> |
              <a href="#">Clients</a>
            </p>
          </footer>
        </div>
        <!-- end footer wrapper -->
      </div>
    </div>
    <script src="js/scripts.js" type="module"></script>
  </body>
</html>
